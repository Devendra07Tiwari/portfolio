<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Message Sent | Devendra Tiwari</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0f0f14;
      font-family:'Outfit',sans-serif;
      overflow:hidden;
      color:#f5f0e8;
      text-align:center;
      padding:20px;
    }

    .container{
      max-width:650px;
      background:#1c1c25;
      padding:60px 40px;
      border-radius:20px;
      border:1px solid rgba(201,168,76,0.2);
      box-shadow:0 0 50px rgba(201,168,76,0.08);
      animation:fadeIn 0.8s ease;
    }

    .checkmark{
      width:100px;
      height:100px;
      margin:0 auto 30px;
      border-radius:50%;
      background:linear-gradient(135deg,#c9a84c,#e8c87a);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:48px;
      color:#0f0f14;
      animation:pop 0.5s ease;
    }

    h1{
      font-family:'Playfair Display',serif;
      font-size:42px;
      margin-bottom:15px;
      color:#ffffff;
    }

    p{
      font-size:18px;
      line-height:1.8;
      color:#b8b8c5;
      margin-bottom:35px;
    }

    .btn{
      display:inline-block;
      padding:14px 32px;
      border-radius:100px;
      text-decoration:none;
      background:linear-gradient(135deg,#c9a84c,#e8c87a);
      color:#0f0f14;
      font-weight:600;
      transition:0.3s;
    }

    .btn:hover{
      transform:translateY(-3px);
      box-shadow:0 8px 30px rgba(201,168,76,0.3);
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes pop{
      from{
        transform:scale(0);
      }
      to{
        transform:scale(1);
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="checkmark">
      ✓
    </div>

    <h1>Message Sent Successfully</h1>

    <p>
      Thank you for reaching out. <br>
      I’ve received your message and will get back to you within 24 hours.
    </p>

    <a href="index.html" class="btn">
      Back to Portfolio
    </a>

  </div>

</body>
</html>
